<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.6;">
<h3>Raw Push API test (no Firebase involved)</h3>
<p>This tests ONLY the browser's native PushManager.subscribe(), bypassing Firebase's SDK entirely, to isolate whether the problem is in Firebase's code or the browser/environment.</p>
<button id="runBtn" style="font-size: 18px; padding: 14px 24px;">Run test</button>
<pre id="out" style="white-space: pre-wrap; background: #f0f0f0; padding: 14px; margin-top: 16px; border-radius: 8px;"></pre>
<script>
const VAPID_KEY = "BBIXUwo__seexLzP7lI06FT4yzwYlHUEBNenMXGXp8spvlI75JBPFPnw-RanpbolqSZFkGP2D2aCaQ3NN7eMlkc";

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

const out = document.getElementById('out');
function log(msg) { out.textContent += msg + '\n'; }

document.getElementById('runBtn').addEventListener('click', async () => {
  out.textContent = '';
  try {
    log('1. Checking support...');
    log('   serviceWorker in navigator: ' + ('serviceWorker' in navigator));
    log('   PushManager in window: ' + ('PushManager' in window));

    log('2. Requesting notification permission...');
    const perm = await Notification.requestPermission();
    log('   Permission: ' + perm);
    if (perm !== 'granted') { log('STOPPED: permission not granted'); return; }

    log('3. Registering raw test service worker...');
    const reg = await navigator.serviceWorker.register('./test-sw.js');
    await navigator.serviceWorker.ready;
    log('   Registered, scope: ' + reg.scope);
    log('   Active worker: ' + (reg.active ? reg.active.state : 'none'));

    log('4. Converting VAPID key...');
    const appServerKey = urlBase64ToUint8Array(VAPID_KEY);
    log('   Converted byte length: ' + appServerKey.length);
    log('   First byte: 0x' + appServerKey[0].toString(16));

    log('5. Calling PushManager.subscribe() directly (no Firebase)...');
    const subscription = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: appServerKey
    });
    log('   SUCCESS!');
    log('   Endpoint: ' + subscription.endpoint.substring(0, 60) + '...');
  } catch (err) {
    log('   FAILED at this step.');
    log('   Error name: ' + err.name);
    log('   Error message: ' + err.message);
  }
});
</script>
</body></html>
