<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="data:application/manifest+json,%7B%22display%22%3A%22standalone%22%2C%22start_url%22%3A%22.%22%2C%22name%22%3A%22FB%20Test%22%7D">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging-compat.js"></script>
</head>
<body style="font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.6;">
<h3>Firebase-only getToken test</h3>
<p>Uses ONLY Firebase's compat SDK getToken(), with the exact same VAPID key and config as MedTrack, to isolate whether the SDK itself is the problem.</p>
<button id="runBtn" style="font-size: 18px; padding: 14px 24px;">Run test</button>
<pre id="out" style="white-space: pre-wrap; background: #f0f0f0; padding: 14px; margin-top: 16px; border-radius: 8px;"></pre>
<script>
const out = document.getElementById('out');
function log(msg) { out.textContent += msg + '\n'; }

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCwgJdS3w2pp1J338HZdCY73plR7sLpnTg",
  authDomain: "medtrack-15e60.firebaseapp.com",
  projectId: "medtrack-15e60",
  storageBucket: "medtrack-15e60.firebasestorage.app",
  messagingSenderId: "94318596769",
  appId: "1:94318596769:web:8e617a6c43201d08f6d6e0"
};
const VAPID_KEY = "BBIXUwo__seexLzP7lI06FT4yzwYlHUEBNenMXGXp8spvlI75JBPFPnw-RanpbolqSZFkGP2D2aCaQ3NN7eMlkc";

document.getElementById('runBtn').addEventListener('click', async () => {
  out.textContent = '';
  try {
    log('display-mode standalone: ' + window.matchMedia('(display-mode: standalone)').matches);
    log('1. Initializing Firebase app...');
    firebase.initializeApp(FIREBASE_CONFIG);
    log('   Done.');

    log('2. Getting messaging instance...');
    const messaging = firebase.messaging();
    log('   Done.');

    log('3. Requesting notification permission...');
    const perm = await Notification.requestPermission();
    log('   Permission: ' + perm);
    if (perm !== 'granted') { log('STOPPED'); return; }

    log('4. Registering service worker (reusing MedTrack\'s existing one)...');
    const reg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    await navigator.serviceWorker.ready;
    log('   Scope: ' + reg.scope);

    log('5. Calling firebase messaging.getToken()...');
    const token = await messaging.getToken({
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: reg
    });
    log('   SUCCESS! Token (first 30 chars): ' + token.substring(0, 30) + '...');
  } catch (err) {
    log('   FAILED.');
    log('   Error name: ' + err.name);
    log('   Error code: ' + (err.code || 'n/a'));
    log('   Error message: ' + err.message);
  }
});
</script>
</body></html>
