<style>
  :root{
    --paper:#FDFBF6;
    --pine:#1B3A34;
    --teal:#2D6A5F;
    --teal-light:#E4EEEA;
    --amber:#C7621B;
    --amber-light:#FBE9DD;
    --line:#E8E2D4;
    --muted:#8A8275;
    --white:#FFFFFF;
    --error:#B3432F;
    --coral:#E0654A;
    --coral-light:#FCE7E1;
    --plum:#7D5BA6;
    --plum-light:#EFE7F7;
    --sky:#2E7FAE;
    --sky-light:#E2F0F8;
    --gold:#D4A017;
    --gold-light:#FBF1D9;
    --page-tint:#FBF6EE;
    --shadow: 0 2px 10px rgba(27,58,52,0.06);
    --shadow-lift: 0 12px 28px rgba(27,58,52,0.16);
    --shadow-card: 0 4px 14px rgba(27,58,52,0.08);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--page-tint);
    color:var(--pine);
    font-family:'Noto Sans Khmer','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:120px;
  }
  /* Latin-script bits (brand subtitle, digits) keep Inter/Fraunces; everything else inherits Noto Sans Khmer */
  .latin{font-family:'Inter',sans-serif;}

  .wrap{max-width:560px; margin:0 auto; padding:0 18px;}
  .hidden{display:none !important;}

  /* ===================== LANGUAGE TOGGLE ===================== */
  .lang-toggle{
    position:fixed; top:env(safe-area-inset-top, 0px); top:calc(env(safe-area-inset-top, 0px) + 16px); right:16px; z-index:70;
    background:var(--white); border:1.5px solid var(--line); border-radius:999px;
    display:flex; padding:4px; box-shadow:var(--shadow); font-family:'Inter',sans-serif;
  }
  .lang-toggle button{
    border:none; background:none; padding:9px 16px; border-radius:999px;
    font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; min-width:44px; min-height:36px;
  }
  .lang-toggle button.active{background:var(--pine); color:var(--paper);}

  /* ===================== AUTH SCREENS ===================== */
  .auth-screen{
    min-height:100vh; display:flex; flex-direction:column; justify-content:center;
    padding:32px 22px; max-width:440px; margin:0 auto;
    background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(45,106,95,0.10), transparent 60%),
               radial-gradient(ellipse 70% 50% at 50% 100%, rgba(212,160,23,0.08), transparent 60%);
  }
  .auth-brand{text-align:center; margin-bottom:34px;}
  .auth-brand .eyebrow{font-size:12px; letter-spacing:.05em; color:var(--muted); font-weight:600; margin:0 0 8px;}
  .auth-brand h1{font-family:'Noto Sans Khmer',serif; font-weight:700; font-size:34px; margin:0; color:var(--pine);}
  .auth-brand .subtitle{font-family:'Fraunces',serif; font-size:14px; letter-spacing:.04em; color:var(--teal); margin-top:4px; font-weight:600;}
  .auth-brand .brand-mark{width:102px; height:102px; margin:0 auto 14px;}
  .brand-mark{
    width:34px; height:34px; flex:none;
    background-image:url("data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%2064%2064%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%0A%20%20%3Cg%20transform%3D%22translate%2832%2C32%29%20rotate%28-45%29%20translate%28-19%2C-9.5%29%22%3E%0A%20%20%20%20%3Crect%20x%3D%220%22%20y%3D%220%22%20width%3D%2238%22%20height%3D%2219%22%20rx%3D%229.5%22%20fill%3D%22%231B3A34%22/%3E%0A%20%20%20%20%3Crect%20x%3D%220%22%20y%3D%220%22%20width%3D%2219%22%20height%3D%2219%22%20rx%3D%229.5%22%20fill%3D%22%232D6A5F%22/%3E%0A%20%20%20%20%3Cline%20x1%3D%2222%22%20y1%3D%223.5%22%20x2%3D%2229%22%20y2%3D%223.5%22%20stroke%3D%22%23FDFBF6%22%20stroke-width%3D%221.8%22%20stroke-linecap%3D%22round%22%20opacity%3D%220.9%22/%3E%0A%20%20%20%20%3Cline%20x1%3D%2220%22%20y1%3D%226.5%22%20x2%3D%2225%22%20y2%3D%226.5%22%20stroke%3D%22%23FDFBF6%22%20stroke-width%3D%221.8%22%20stroke-linecap%3D%22round%22%20opacity%3D%220.6%22/%3E%0A%20%20%3C/g%3E%0A%3C/svg%3E");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
  }
  .brand-block .brand-mark{width:30px; height:30px;}
  .auth-card{background:var(--white); border:1px solid var(--line); border-top:3px solid var(--teal); border-radius:20px; padding:26px 22px; box-shadow:var(--shadow-card);}
  .auth-title{font-family:'Noto Sans Khmer',serif; font-size:20px; font-weight:700; margin:0 0 4px;}
  .auth-sub{font-size:13px; color:var(--muted); margin:0 0 20px; line-height:1.6;}
  .field{margin-bottom:15px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px;}
  .field input, .field select{
    width:100%; padding:13px 14px; border:1.5px solid var(--line); border-radius:12px;
    font-size:15px; font-family:'Noto Sans Khmer','Inter',sans-serif; background:var(--white); color:var(--pine);
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--teal);}
  .field-hint{font-size:12px; color:var(--muted); margin-top:5px; line-height:1.5;}

  .consent-box{
    background:var(--teal-light); border-radius:12px; padding:13px 14px; font-size:12.5px;
    color:var(--pine); line-height:1.65; margin-bottom:16px; display:flex; gap:10px; align-items:flex-start;
  }
  .consent-box input[type=checkbox]{margin-top:2px; width:16px; height:16px; flex:none; accent-color:var(--teal);}
  .consent-box label{font-weight:500; cursor:pointer;}

  .btn-primary{
    width:100%; background:linear-gradient(135deg, var(--teal), var(--pine)); color:var(--paper); border:none; border-radius:12px;
    padding:14px; font-weight:700; font-size:15px; cursor:pointer; margin-top:6px;
    font-family:'Noto Sans Khmer','Inter',sans-serif;
  }
  .btn-primary:disabled{opacity:.6; cursor:default;}
  .btn-primary .spinner{
    display:inline-block; width:14px; height:14px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; animation:spin .7s linear infinite;
    vertical-align:-2px; margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .auth-switch{text-align:center; margin-top:18px; font-size:13.5px; color:var(--muted);}
  .auth-switch a{color:var(--teal); font-weight:700; text-decoration:none; cursor:pointer;}

  .auth-banner{border-radius:12px; padding:11px 14px; font-size:13px; margin-bottom:16px; display:none; line-height:1.6;}
  .auth-banner.show{display:block;}
  .auth-banner.error{background:#FBEAE6; color:var(--error);}
  .auth-banner.success{background:var(--teal-light); color:var(--teal);}

  /* ===================== APP HEADER ===================== */
  header.top{padding:38px 18px 18px; max-width:560px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;}
  .brand-block{display:flex; align-items:center; gap:10px;}
  .eyebrow{font-size:12px; letter-spacing:.05em; color:var(--muted); font-weight:600; margin:0 0 4px;}
  h1.brand{font-family:'Noto Sans Khmer',serif; font-weight:700; font-size:26px; margin:0; color:var(--pine);}
  h1.brand .subtitle{display:block; font-family:'Fraunces',serif; font-size:11.5px; color:var(--teal); font-weight:600; letter-spacing:.04em; margin-top:2px;}
  .account-btn{
    width:38px; height:38px; border-radius:50%; background:var(--teal-light); border:none; color:var(--teal);
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:700; font-size:14px; flex:none;
  }

  /* ===================== HERO ===================== */
  .hero{
    background:linear-gradient(150deg, var(--pine) 0%, var(--teal) 65%, #2a6b5e 100%); border-radius:22px; padding:26px 24px 24px;
    color:var(--paper); box-shadow:var(--shadow-lift); position:relative; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%);
  }
  .hero::before{
    content:""; position:absolute; left:-30px; bottom:-50px; width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle, rgba(212,160,23,0.18), transparent 70%);
  }
  .hero-label{font-size:12px; letter-spacing:.04em; opacity:.7; font-weight:600; margin:0 0 10px; position:relative;}
  .hero-main{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; position:relative;}
  .hero-time{font-family:'Fraunces',serif; font-size:44px; font-weight:600; line-height:1; letter-spacing:-0.02em;}
  .hero-name{font-size:16px; font-weight:700; opacity:.95;}
  .hero-dose{font-size:13px; opacity:.7; margin-top:4px;}
  .hero-empty{font-family:'Noto Sans Khmer',serif; font-size:18px; font-weight:600; opacity:.92; padding:6px 0 2px; line-height:1.6;}
  .hero-countdown{margin-top:16px; font-size:13px; opacity:.85; display:flex; align-items:center; gap:8px;}
  .pulse-dot{width:7px; height:7px; border-radius:50%; background:#7FE0C3; box-shadow:0 0 0 0 rgba(127,224,195,.6); animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(127,224,195,.55);} 70%{box-shadow:0 0 0 8px rgba(127,224,195,0);} 100%{box-shadow:0 0 0 0 rgba(127,224,195,0);}}
  .sync-banner{
    margin-top:14px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18); border-radius:12px;
    padding:10px 14px; font-size:12.5px; line-height:1.55; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .sync-banner button{background:var(--paper); color:var(--pine); border:none; border-radius:8px; padding:7px 12px; font-weight:700; font-size:12.5px; cursor:pointer; white-space:nowrap; font-family:'Noto Sans Khmer','Inter',sans-serif;}
  .low-stock-banner{background:rgba(199,98,27,0.25); border-color:rgba(199,98,27,0.4); justify-content:flex-start;}
  .adherence-row{margin-top:14px; display:flex; align-items:center; gap:10px;}
  .adherence-bar{flex:1; height:6px; border-radius:99px; background:rgba(255,255,255,0.18); overflow:hidden;}
  .adherence-fill{height:100%; border-radius:99px; background:#7FE0C3; transition:width .4s ease;}
  #adherenceText{font-size:12px; opacity:.85; white-space:nowrap; flex:none;}

  /* ===================== SECTIONS ===================== */
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin:30px 0 12px; gap:10px;}
  .section-title{font-family:'Noto Sans Khmer',serif; font-size:18px; font-weight:700; color:var(--pine); display:flex; align-items:center; gap:8px;}
  .section-title::before{content:""; width:7px; height:7px; border-radius:50%; background:var(--teal); flex:none;}
  .section-sub{font-size:12.5px; color:var(--muted);}

  .timeline{display:flex; flex-direction:column; gap:10px;}
  .dose-card{background:var(--white); border:1px solid var(--line); border-radius:16px; padding:14px 14px 14px 0; display:flex; align-items:center; gap:0; position:relative; box-shadow:var(--shadow-card);}
  .dose-card.taken{opacity:.55;}
  .dose-card.due{border-color:var(--amber); background:var(--amber-light);}
  .dose-card.missed{border-color:var(--error); background:#FBEAE6;}
  .dose-card.missed .dose-time-col{color:var(--error);}
  .missed-tag{font-size:11px; font-weight:700; color:var(--error); margin-top:2px;}
  .dose-time-col{
    width:78px; flex:none; text-align:center; font-family:'Fraunces',serif; font-size:14px; font-weight:600; color:var(--teal);
    border-right:1px dashed var(--line); padding:0 6px; align-self:stretch; display:flex; align-items:center; justify-content:center;
  }
  .dose-card.due .dose-time-col{color:var(--amber);}
  .capsule{width:34px; height:34px; border-radius:10px; flex:none; margin:0 12px; position:relative; overflow:hidden; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);}
  .dose-info{flex:1; min-width:0;}
  .dose-drug{font-size:15px; font-weight:700; margin:0 0 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .dose-meta{font-size:12.5px; color:var(--muted);}
  .dose-action{flex:none; margin-right:6px;}
  .check-btn{
    width:38px; height:38px; border-radius:50%; border:1.5px solid var(--line); background:var(--white);
    cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted);
  }
  .check-btn svg{width:18px; height:18px;}
  .dose-card.due .check-btn{border-color:var(--amber); color:var(--amber);}
  .check-btn.checked{background:var(--teal); border-color:var(--teal); color:#fff;}
  .dose-card.due .check-btn.checked{background:var(--amber); border-color:var(--amber);}

  .empty-state{text-align:center; padding:36px 20px; color:var(--muted); font-size:14px; background:var(--white); border:1px dashed var(--line); border-radius:16px; line-height:1.6;}
  .empty-state strong{display:block; font-family:'Noto Sans Khmer',serif; font-size:16px; color:var(--pine); font-weight:700; margin-bottom:6px;}

  .med-list{display:flex; flex-direction:column; gap:10px;}
  .med-row{background:var(--white); border:1px solid var(--line); border-radius:16px; padding:14px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow-card);}
  .med-row .capsule{margin:0;}
  .med-row-info{flex:1; min-width:0;}
  .dash-about{
    margin-top:30px; padding:20px 18px; background:var(--white); border:1px solid var(--line);
    border-radius:16px; text-align:center; box-shadow:var(--shadow-card);
  }
  .dash-about-mission{font-size:13px; color:var(--pine); line-height:1.7; margin:0 0 12px;}
  .dash-about-dev{font-size:13px; color:var(--muted); margin:0 0 14px;}
  .dash-about-dev strong{color:var(--pine); font-family:'Noto Sans Khmer',serif;}
  .med-row-name{font-size:15px; font-weight:700;}
  .med-row-detail{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .med-row-times{font-size:11.5px; color:var(--teal); margin-top:4px; font-weight:700;}
  .stock-line{font-size:11.5px; color:var(--muted); margin-top:4px;}
  .stock-line.low{color:var(--error); font-weight:700;}
  .icon-btn{background:none; border:none; cursor:pointer; color:var(--muted); padding:6px; border-radius:8px; display:flex;}
  .icon-btn:hover{background:var(--teal-light); color:var(--teal);}
  .icon-btn svg{width:18px; height:18px;}

  .fab{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg, var(--teal), var(--pine)); color:var(--paper);
    border:none; border-radius:999px; padding:15px 24px; font-weight:700; font-size:14.5px; display:flex;
    align-items:center; gap:8px; box-shadow:var(--shadow-lift); cursor:pointer; z-index:40;
    font-family:'Noto Sans Khmer','Inter',sans-serif;
  }
  .fab svg{width:18px; height:18px;}

  .overlay{position:fixed; inset:0; background:rgba(27,58,52,0.35); backdrop-filter:blur(2px); z-index:50; opacity:0; pointer-events:none; transition:opacity .2s ease;}
  .overlay.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; background:var(--paper);
    border-radius:24px 24px 0 0; z-index:51; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1);
    max-height:88vh; overflow-y:auto; box-shadow:0 -10px 40px rgba(0,0,0,0.2);
  }
  .sheet.show{transform:translateY(0);}
  .sheet-inner{padding:10px 22px 28px;}
  .sheet-handle{width:36px; height:4px; background:var(--teal); opacity:.5; border-radius:99px; margin:10px auto 16px;}
  .sheet-title{font-family:'Noto Sans Khmer',serif; font-size:20px; font-weight:700; margin:0 0 18px; color:var(--pine);}
  .row2{display:flex; gap:12px;}
  .row2 .field{flex:1;}
  .color-picker{display:flex; gap:10px; flex-wrap:wrap;}
  .color-dot{width:34px; height:34px; border-radius:10px; cursor:pointer; border:2px solid transparent; position:relative; overflow:hidden;}
  .color-dot.active{border-color:var(--pine); box-shadow:0 0 0 2px var(--paper), 0 0 0 4px var(--pine);}
  .freq-grid{display:flex; gap:8px; flex-wrap:wrap;}
  .freq-chip{padding:8px 14px; border-radius:999px; border:1.5px solid var(--line); background:var(--white); font-size:13px; font-weight:700; cursor:pointer; color:var(--muted); font-family:'Noto Sans Khmer','Inter',sans-serif;}
  .freq-chip.active{background:var(--teal); border-color:var(--teal); color:#fff;}
  .times-list{display:flex; flex-direction:column; gap:8px;}
  .time-row{display:flex; gap:8px; align-items:center;}
  .time-row input[type=time]{flex:1; padding:10px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:15px; font-family:'Inter',sans-serif;}
  .remove-time{background:none; border:none; color:var(--muted); cursor:pointer; padding:4px;}
  .add-time-btn{margin-top:6px; background:none; border:1.5px dashed var(--line); border-radius:10px; padding:9px; width:100%; color:var(--teal); font-weight:700; font-size:13px; cursor:pointer; font-family:'Noto Sans Khmer','Inter',sans-serif;}
  .sheet-actions{display:flex; gap:10px; margin-top:22px;}
  .btn-ghost{background:none; border:1.5px solid var(--line); border-radius:12px; padding:14px 18px; font-weight:700; font-size:14px; color:var(--muted); cursor:pointer; font-family:'Noto Sans Khmer','Inter',sans-serif;}
  .btn-danger-text{text-align:center; color:var(--error); font-size:13px; font-weight:700; margin-top:14px; cursor:pointer; background:none; border:none; width:100%; padding:8px; font-family:'Noto Sans Khmer','Inter',sans-serif;}

  .alarm-overlay{position:fixed; inset:0; background:rgba(27,58,52,0.55); z-index:60; display:none; align-items:center; justify-content:center; padding:20px;}
  .alarm-overlay.show{display:flex;}
  .alarm-card{background:var(--paper); border-radius:22px; padding:30px 26px; max-width:380px; width:100%; text-align:center; box-shadow:var(--shadow-lift); animation:popIn .25s cubic-bezier(.32,.72,0,1); border:2px solid var(--teal-light);}
  .alarm-card.escalated{border-color:var(--amber); background:var(--amber-light);}
  .alarm-card.escalated .alarm-eyebrow{color:var(--error);}
  @keyframes popIn{from{transform:scale(.92); opacity:0;} to{transform:scale(1); opacity:1;}}
  .alarm-capsule{width:64px; height:64px; border-radius:18px; margin:0 auto 18px; position:relative; overflow:hidden;}
  .alarm-eyebrow{font-size:12px; letter-spacing:.04em; color:var(--amber); font-weight:700; margin-bottom:6px;}
  .alarm-title{font-family:'Noto Sans Khmer',serif; font-size:20px; font-weight:700; margin:0 0 6px;}
  .alarm-sub{font-size:13.5px; color:var(--muted); margin-bottom:22px; line-height:1.6;}
  .alarm-actions{display:flex; gap:10px;}

  .account-row{display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .account-row:last-child{border-bottom:none;}
  .account-row span:first-child{color:var(--muted);}
  .account-row span:last-child{font-weight:700;}

  .fb-follow-btn{
    display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
    background:#1877F2; color:#fff; text-decoration:none; border-radius:12px; padding:13px;
    font-weight:700; font-size:14.5px; font-family:'Noto Sans Khmer','Inter',sans-serif;
  }

  footer.app-footer{text-align:center; color:var(--muted); font-size:11.5px; padding:30px 18px 10px; line-height:1.6;}

  @media (prefers-reduced-motion: reduce){.pulse-dot, .alarm-card{animation:none;} *{transition:none !important;}}
</style>
</head>
<body>

<div class="lang-toggle">
  <button id="langKm" onclick="setLang('km')">ខ្មែរ</button>
  <button id="langEn" onclick="setLang('en')">EN</button>
</div>

<!-- ===================== AUTH: LOGIN ===================== -->
<div class="auth-screen" id="screenLogin">
  <div class="auth-brand">
    <div class="brand-mark" aria-hidden="true"></div>
    <p class="eyebrow" data-t="eyebrow"></p>
    <h1 data-t="brandKhmer"></h1>
    <p class="subtitle latin">MedTrack</p>
  </div>
  <div class="auth-card">
    <h2 class="auth-title" data-t="loginTitle"></h2>
    <p class="auth-sub" data-t="loginSub"></p>
    <div class="auth-banner error" id="loginError"></div>
    <div class="field">
      <label data-t="phoneLabel"></label>
      <input type="tel" id="loginPhone" inputmode="numeric" autocomplete="tel">
    </div>
    <div class="field">
      <label data-t="pinLabel"></label>
      <input type="password" id="loginPin" inputmode="numeric" maxlength="6" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()" data-t="loginBtn"></button>
    <p class="auth-switch"><a onclick="showScreen('recoverPhone')" data-t="forgotPin"></a></p>
  </div>
  <p class="auth-switch"><span data-t="newHere"></span> <a onclick="showScreen('signup')" data-t="createAccount"></a></p>
</div>

<!-- ===================== AUTH: SIGNUP ===================== -->
<div class="auth-screen hidden" id="screenSignup">
  <div class="auth-brand">
    <div class="brand-mark" aria-hidden="true"></div>
    <p class="eyebrow" data-t="eyebrow"></p>
    <h1 data-t="brandKhmer"></h1>
    <p class="subtitle latin">MedTrack</p>
  </div>
  <div class="auth-card">
    <h2 class="auth-title" data-t="signupTitle"></h2>
    <p class="auth-sub" data-t="signupSub"></p>
    <div class="auth-banner error" id="signupError"></div>
    <div class="field">
      <label data-t="nameLabel"></label>
      <input type="text" id="suName">
    </div>
    <div class="field">
      <label data-t="phoneLabel"></label>
      <input type="tel" id="suPhone" inputmode="numeric" autocomplete="tel">
      <p class="field-hint" data-t="phoneHint"></p>
    </div>
    <div class="field">
      <label data-t="choosePin"></label>
      <input type="password" id="suPin" inputmode="numeric" maxlength="6">
    </div>
    <div class="field">
      <label data-t="securityQuestionLabel"></label>
      <select id="suQuestion"></select>
    </div>
    <div class="field">
      <label data-t="yourAnswer"></label>
      <input type="text" id="suAnswer">
      <p class="field-hint" data-t="answerHint"></p>
    </div>
    <div class="consent-box">
      <input type="checkbox" id="suConsent">
      <label for="suConsent" data-t="consentText"></label>
    </div>
    <button class="btn-primary" id="signupBtn" onclick="doSignup()" data-t="createAccountBtn"></button>
  </div>
  <p class="auth-switch"><span data-t="alreadyHave"></span> <a onclick="showScreen('login')" data-t="login"></a></p>
</div>

<!-- ===================== AUTH: RECOVER STEP 1 (phone) ===================== -->
<div class="auth-screen hidden" id="screenRecoverPhone">
  <div class="auth-brand">
    <div class="brand-mark" aria-hidden="true"></div>
    <p class="eyebrow" data-t="eyebrow"></p>
    <h1 data-t="brandKhmer"></h1>
    <p class="subtitle latin">MedTrack</p>
  </div>
  <div class="auth-card">
    <h2 class="auth-title" data-t="recoverTitle"></h2>
    <p class="auth-sub" data-t="recoverSub"></p>
    <div class="auth-banner error" id="recoverPhoneError"></div>
    <div class="field">
      <label data-t="phoneLabel"></label>
      <input type="tel" id="recPhone" inputmode="numeric" autocomplete="tel">
    </div>
    <button class="btn-primary" id="recoverPhoneBtn" onclick="doRecoverGetQuestion()" data-t="continueBtn"></button>
  </div>
  <p class="auth-switch"><a onclick="showScreen('login')" data-t="backToLogin"></a></p>
</div>

<!-- ===================== AUTH: RECOVER STEP 2 (answer + new pin) ===================== -->
<div class="auth-screen hidden" id="screenRecoverAnswer">
  <div class="auth-brand">
    <div class="brand-mark" aria-hidden="true"></div>
    <p class="eyebrow" data-t="eyebrow"></p>
    <h1 data-t="brandKhmer"></h1>
    <p class="subtitle latin">MedTrack</p>
  </div>
  <div class="auth-card">
    <h2 class="auth-title" data-t="answerTitle"></h2>
    <p class="auth-sub" id="recoverQuestionText">—</p>
    <div class="auth-banner error" id="recoverAnswerError"></div>
    <div class="field">
      <label data-t="yourAnswer"></label>

function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key] !== undefined) ? I18N[currentLang][key] : (I18N.en[key] || key);
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('medtrack_lang', lang);
  applyTranslations();
  document.getElementById('langKm').classList.toggle('active', lang === 'km');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang;
  // re-render dynamic content that depends on language

    renderAll();
  }

  document.querySelectorAll('[data-t]').forEach(el => {

/* ============ API HELPER ============ */
async function api(action, payload) {
  if (API_URL.indexOf('PASTE_YOUR') === 0) {
    throw new Error(t('notConnected'));
  }
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({ action }, payload))
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Error');
  return data;
}

/* ============ SCREEN ROUTING ============ */
function showScreen(name) {
  ['Login','Signup','RecoverPhone','RecoverAnswer'].forEach(s => document.getElementById('screen' + s).classList.add('hidden'));
  document.getElementById('screenApp').classList.add('hidden');
  const map = { login: 'screenLogin', signup: 'screenSignup', recoverPhone: 'screenRecoverPhone', recoverAnswer: 'screenRecoverAnswer' };
  document.getElementById(map[name]).classList.remove('hidden');
  hideAllBanners();
}
function hideAllBanners() { document.querySelectorAll('.auth-banner').forEach(b => b.classList.remove('show')); }
function showError(id, message) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.classList.remove('success');
  el.classList.add('error', 'show');
}
function setBtnLoading(id, loading, labelKey) {
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' + t('pleaseWait') : t(labelKey);
}

/* ============ AUTH ACTIONS ============ */
async function doLogin() {
  hideAllBanners();
  const phone = document.getElementById('loginPhone').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  if (!phone || !pin) { showError('loginError', t('pleaseEnterPhonePin')); return; }
  setBtnLoading('loginBtn', true);
  try {
    const data = await api('login', { phone, pin });
    session = { userId: data.userId, name: data.name, phone };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    await enterApp();
  } catch (err) {
    showError('loginError', err.message);
  } finally {
    setBtnLoading('loginBtn', false, 'loginBtn');
  }
}

async function doSignup() {
  hideAllBanners();
  const name = document.getElementById('suName').value.trim();
  const phone = document.getElementById('suPhone').value.trim();
  const pin = document.getElementById('suPin').value.trim();
  const question = document.getElementById('suQuestion').value;
  const answer = document.getElementById('suAnswer').value.trim();
  const consent = document.getElementById('suConsent').checked;

  if (!name || !phone || !pin || !question || !answer) { showError('signupError', t('pleaseFillAll')); return; }
  if (!/^\d{4,6}$/.test(pin)) { showError('signupError', t('pinDigits')); return; }
  if (!consent) { showError('signupError', t('pleaseConfirmConsent')); return; }

  setBtnLoading('signupBtn', true);
  try {
    const data = await api('signup', { name, phone, pin, securityQuestion: question, securityAnswer: answer });
    session = { userId: data.userId, name: data.name, phone };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    await enterApp();
  } catch (err) {
    showError('signupError', err.message);
  } finally {
    setBtnLoading('signupBtn', false, 'createAccountBtn');
  }
}

async function doRecoverGetQuestion() {
  hideAllBanners();
  const phone = document.getElementById('recPhone').value.trim();
  if (!phone) { showError('recoverPhoneError', t('pleaseEnterPhone')); return; }
  setBtnLoading('recoverPhoneBtn', true);
  try {

async function doResetPin() {
  hideAllBanners();
  const answer = document.getElementById('recAnswer').value.trim();
  const newPin = document.getElementById('recNewPin').value.trim();
  if (!answer || !newPin) { showError('recoverAnswerError', t('pleaseFillBoth')); return; }
  if (!/^\d{4,6}$/.test(newPin)) { showError('recoverAnswerError', t('newPinDigits')); return; }

function doLogout() {
  if (!confirm(t('confirmLogout'))) return;
  clearAlarmTimers();

async function enterApp() {
  document.getElementById('screenLogin').classList.add('hidden');
  document.getElementById('screenSignup').classList.add('hidden');
  document.getElementById('screenRecoverPhone').classList.add('hidden');
  document.getElementById('screenRecoverAnswer').classList.add('hidden');
  document.getElementById('screenApp').classList.remove('hidden');
  document.getElementById('accountInitial').textContent = (session.name || '?').trim().charAt(0).toUpperCase();
  document.getElementById('acctName').textContent = session.name;
  document.getElementById('acctPhone').textContent = session.phone;

  document.getElementById('heroContent').innerHTML = `<p class="hero-empty">${t('loadingSchedule')}</p>`;
  try {
    const [medsData, logsData] = await Promise.all([
      api('get_medications', { userId: session.userId }),
      api('get_logs', { userId: session.userId, dateKey: todayKey() })
    ]);
    meds = medsData.medications || [];
    takenLog = logsData.logs || {};
    await loadWeeklyAdherence();
  } catch (err) {
    meds = [];
    takenLog = {};
    document.getElementById('heroContent').innerHTML = `<p class="hero-empty">${t('couldNotLoad')}${escapeHtml(err.message)}</p>`;
  }
  renderAll();
  scheduleAlarms();
  silentlyResyncPushToken();
}

/* ============ UTIL ============ */
function uid() { return 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function dateKeyForOffset(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return { key: d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'), weekday: d.getDay() };
}
function medScheduledOnWeekday(med, weekday) {
  if (med.freq === 'daily') return true;
  if (med.freq === 'weekdays') return weekday >= 1 && weekday <= 5;
  if (med.freq === 'custom') return (med.days || []).includes(weekday);
  return true;
}
async function loadWeeklyAdherence() {
  const last7 = [];
  for (let i = 0; i < 7; i++) last7.push(dateKeyForOffset(i));
  const dateKeys = last7.map(d => d.key);

  let scheduled = 0;
  last7.forEach(d => {
    meds.forEach(med => {
      if (medScheduledOnWeekday(med, d.weekday)) scheduled += (med.times || []).length;
    });
  });

  let taken = 0;
  try {
    const data = await api('get_logs_range', { userId: session.userId, dateKeys });
    const byDate = data.takenByDate || {};
    dateKeys.forEach(k => { taken += (byDate[k] || 0); });
  } catch (err) {
    // If the backend doesn't support this yet (older deployment), fall back
    // to just today's count so the app still works without this feature.
    taken = Object.keys(takenLog).length;
    scheduled = (meds || []).reduce((sum, med) => sum + (medActiveToday(med) ? (med.times || []).length : 0), 0);
  }
  weeklyStats = { taken, scheduled };
}
function logKeyFor(medId, time) { return medId + '|' + time; }
function isTaken(medId, time) { return !!takenLog[logKeyFor(medId, time)]; }
async function setTaken(medId, time, val) {
  const k = logKeyFor(medId, time);
  const wasTaken = !!takenLog[k];
  if (val) takenLog[k] = true; else delete takenLog[k];
  if (val && !wasTaken) weeklyStats.taken += 1;
  if (!val && wasTaken) weeklyStats.taken = Math.max(0, weeklyStats.taken - 1);

  // Optimistically adjust local stock so the UI feels instant; the server
  // call below returns the authoritative value to correct for edge cases
  // (e.g. duplicate calls, or stock already at zero).
  const med = meds.find(m => m.id === medId);
  const stateChanged = val !== wasTaken;
  if (med && stateChanged && med.stockCount !== null && med.stockCount !== undefined) {
    med.stockCount = Math.max(0, med.stockCount + (val ? -1 : 1));
  }
  renderTimeline();
  renderMedList();

  try {
    const result = await api('set_taken', { userId: session.userId, dateKey: todayKey(), medId, time, taken: val });
    if (med && result && result.newStock !== null && result.newStock !== undefined) {
      med.stockCount = result.newStock;
      renderMedList();
    }
  } catch (err) { console.error('Sync failed:', err.message); }
}
function todayWeekday() { return new Date().getDay(); }
function medActiveToday(med) {
  if (med.freq === 'daily') return true;
  if (med.freq === 'weekdays') return todayWeekday() >= 1 && todayWeekday() <= 5;
  if (med.freq === 'custom') return (med.days || []).includes(todayWeekday());
  return true;
}
function formatTime12(time) {
  const [h, m] = time.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return h12 + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}
function shade(hex, lightenFactor) {
  const c = hex.replace('#', '');
  const r = parseInt(c.substring(0, 2), 16), g = parseInt(c.substring(2, 4), 16), b = parseInt(c.substring(4, 6), 16);
  const nr = Math.round(r + (255 - r) * lightenFactor);
  const ng = Math.round(g + (255 - g) * lightenFactor);
  const nb = Math.round(b + (255 - b) * lightenFactor);
  return `rgb(${nr},${ng},${nb})`;
}
function capsuleStyle(hex) { return `background:linear-gradient(to bottom, ${hex} 0%, ${hex} 50%, ${shade(hex, 0.78)} 50%, ${shade(hex, 0.78)} 100%);`; }
function foodLabel(f) { return { before: t('beforeMeal'), with: t('withMeal'), after: t('afterMeal') }[f] || ''; }
function checkIcon() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function timeDiffMinutes(a, b) {
  const [ah, am] = a.split(':').map(Number);
  const [bh, bm] = b.split(':').map(Number);
  return (bh * 60 + bm) - (ah * 60 + am);
}
function nowHM() {
  const d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

/* ============ RENDER: TODAY TIMELINE + HERO ============ */
function buildTodayDoses() {
  const list = [];
  meds.forEach(med => {
    if (!medActiveToday(med)) return;
    (med.times || []).forEach(time => list.push({ med, time }));
  });
  list.sort((a, b) => a.time.localeCompare(b.time));
  return list;
}

function renderTimeline() {
  const timeline = document.getElementById('timeline');
  const doses = buildTodayDoses();
  const now = nowHM();

  if (doses.length === 0) {
    timeline.innerHTML = `<div class="empty-state"><strong>${t('nothingScheduled')}</strong>${t('nothingScheduledSub')}</div>`;
  } else {
    timeline.innerHTML = doses.map(d => {
      const taken = isTaken(d.med.id, d.time);
      const overdueMinutes = !taken ? timeDiffMinutes(d.time, now) : 0;
      const isMissed = !taken && overdueMinutes >= 120;
      const dueClass = !taken && d.time <= now ? (isMissed ? 'missed' : 'due') : '';
      return `
        <div class="dose-card ${taken ? 'taken' : ''} ${dueClass}" style="${dueClass ? '' : `border-left:4px solid ${d.med.color};`}">
          <div class="dose-time-col latin">${formatTime12(d.time)}</div>
          <div class="capsule" style="${capsuleStyle(d.med.color)}"></div>
          <div class="dose-info">
            <p class="dose-drug">${escapeHtml(d.med.name)}</p>
            <p class="dose-meta">${escapeHtml(d.med.dose || '')}${d.med.food && d.med.food !== 'any' ? ' · ' + foodLabel(d.med.food) : ''}</p>
            ${isMissed ? `<p class="missed-tag">${t('missedDose')}</p>` : ''}
          </div>
          <div class="dose-action">
            <button class="check-btn ${taken ? 'checked' : ''}" onclick="toggleTaken('${d.med.id}','${d.time}')">
              ${taken ? checkIcon() : ''}
            </button>
          </div>
        </div>`;
    }).join('');
  }

  const locale = currentLang === 'km' ? 'km-KH' : 'en-US';
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString(locale, { weekday: 'long', month: 'short', day: 'numeric' });
  renderHero(doses, now);
  renderAdherence();
  renderLowStockBanner();
}

function renderAdherence() {
  const row = document.getElementById('adherenceRow');
  if (weeklyStats.scheduled === 0) { row.style.display = 'none'; return; }
  const pct = Math.round((weeklyStats.taken / weeklyStats.scheduled) * 100);
  row.style.display = 'flex';
  document.getElementById('adherenceFill').style.width = Math.min(pct, 100) + '%';
  document.getElementById('adherenceText').textContent = `${weeklyStats.taken}/${weeklyStats.scheduled} ${t('dosesThisWeek')}`;
}

function renderLowStockBanner() {
  const banner = document.getElementById('lowStockBanner');
  const lowMeds = meds.filter(med =>
    med.stockCount !== null && med.stockCount !== undefined &&
    med.lowStockThreshold !== null && med.lowStockThreshold !== undefined &&
    med.stockCount <= med.lowStockThreshold
  );
  if (lowMeds.length === 0) { banner.style.display = 'none'; return; }
  banner.style.display = 'flex';
  const text = lowMeds.length === 1
    ? `${lowStockIcon()} ${escapeHtml(lowMeds[0].name)} ${t('unitsLeft')}: ${lowMeds[0].stockCount}`
    : `${lowStockIcon()} ${lowMeds.length} ${t('lowStockMultiple')}`;
  document.getElementById('lowStockBannerText').innerHTML = text;
}

function toggleTaken(medId, time) { setTaken(medId, time, !isTaken(medId, time)); }

function renderHero(doses, now) {
  const heroContent = document.getElementById('heroContent');
  const countdownWrap = document.getElementById('heroCountdown');
  const upcoming = doses.find(d => !isTaken(d.med.id, d.time) && d.time >= now);
  const overdue = doses.find(d => !isTaken(d.med.id, d.time) && d.time < now);
  const target = overdue || upcoming;

  if (!target) {
    const allTaken = doses.length > 0 && doses.every(d => isTaken(d.med.id, d.time));
    heroContent.innerHTML = `<p class="hero-empty">${allTaken ? t('allDone') : t('noMedsYet')}</p>`;
    countdownWrap.style.display = 'none';
    return;
  }

  heroContent.innerHTML = `
    <div class="hero-main">
      <span class="hero-time latin">${formatTime12(target.time)}</span>
      <span class="hero-name">${escapeHtml(target.med.name)}</span>
    </div>
    <p class="hero-dose">${escapeHtml(target.med.dose || '')}${target.med.food && target.med.food !== 'any' ? ' · ' + foodLabel(target.med.food) : ''}</p>
  `;
  countdownWrap.style.display = 'flex';
  const diff = timeDiffMinutes(now, target.time);
  if (diff < 0) {
    document.getElementById('countdownText').textContent = `${Math.abs(diff)} ${t('minOverdue')}`;
  } else if (diff === 0) {
    document.getElementById('countdownText').textContent = t('dueNow');
  } else {
    const h = Math.floor(diff / 60), m = diff % 60;
    document.getElementById('countdownText').textContent = h > 0
      ? `${t('inHourMin')} ${h}${t('hourShort')} ${m}${t('minShort')}`
      : `${t('inHourMin')} ${m}${t('minShort')}`;
  }
}

/* ============ RENDER: MED LIBRARY ============ */
function renderMedList() {
  const wrap = document.getElementById('medList');
  document.getElementById('medCount').textContent = meds.length ? String(meds.length) : '';
  if (meds.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><strong>${t('emptyMedList')}</strong>${t('emptyMedListSub')}</div>`;
    return;
  }
  wrap.innerHTML = meds.map(med => {
    const hasStock = med.stockCount !== null && med.stockCount !== undefined;
    const isLow = hasStock && med.lowStockThreshold !== null && med.lowStockThreshold !== undefined && med.stockCount <= med.lowStockThreshold;
    return `
    <div class="med-row" style="border-left:4px solid ${med.color};">
      <div class="capsule" style="${capsuleStyle(med.color)}"></div>
      <div class="med-row-info">
        <p class="med-row-name">${escapeHtml(med.name)}</p>
        <p class="med-row-detail">${escapeHtml(med.dose || '')} · ${freqLabel(med)}</p>
        <p class="med-row-times latin">${(med.times || []).map(formatTime12).join('  ·  ')}</p>
        ${hasStock ? `<p class="stock-line ${isLow ? 'low' : ''}">${isLow ? lowStockIcon() : ''}${med.stockCount} ${t('unitsLeft')}${isLow ? ' · ' + t('lowStockTag') : ''}</p>` : ''}
      </div>
      <button class="icon-btn" onclick="editMedication('${med.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
    </div>
  `;
  }).join('');
}
function lowStockIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;display:inline-block;vertical-align:-1px;margin-right:3px;"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>`;
}
function freqLabel(med) {
  if (med.freq === 'daily') return t('everyDay');
  if (med.freq === 'weekdays') return t('weekdays');
  if (med.freq === 'custom') return (med.days || []).map(d => t('dayShort')[d]).join(', ') || t('customDays');
  return '';
}

/* ============ SHEET: ADD / EDIT ============ */
function buildColorPicker() {
  const cp = document.getElementById('colorPicker');
  cp.innerHTML = PALETTE.map(c => `<div class="color-dot ${c === selectedColor ? 'active' : ''}" style="${capsuleStyle(c)}" onclick="pickColor('${c}')"></div>`).join('');
}
function pickColor(c) { selectedColor = c; buildColorPicker(); }

function buildDaysGrid() {
  const grid = document.getElementById('daysGrid');
  const names = t('dayShort');
  grid.innerHTML = names.map((d, i) => `<button type="button" class="freq-chip ${selectedDays.has(i) ? 'active' : ''}" onclick="toggleDay(${i})">${d}</button>`).join('');
}
function toggleDay(i) {
  if (selectedDays.has(i)) selectedDays.delete(i); else selectedDays.add(i);
  buildDaysGrid();
}

document.getElementById('freqGrid').addEventListener('click', (e) => {
  const btn = e.target.closest('.freq-chip');
  if (!btn) return;
  selectedFreq = btn.dataset.freq;
  document.querySelectorAll('#freqGrid .freq-chip').forEach(b => b.classList.toggle('active', b === btn));
  document.getElementById('daysField').style.display = selectedFreq === 'custom' ? 'block' : 'none';
});

function addTimeRow(value) {
  const list = document.getElementById('timesList');
  const row = document.createElement('div');
  row.className = 'time-row';
  row.innerHTML = `<input type="time" value="${value || '08:00'}"><button type="button" class="remove-time" onclick="this.parentElement.remove()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>`;
  list.appendChild(row);
}

function openSheet() {
  editingId = null;
  document.getElementById('sheetTitle').textContent = t('addMedTitle');
  document.getElementById('medName').value = '';
  document.getElementById('medDose').value = '';
  document.getElementById('medFood').value = 'any';
  document.getElementById('medStock').value = '';
  document.getElementById('medLowStockThreshold').value = '';
  document.getElementById('medNotes').value = '';
  selectedColor = PALETTE[meds.length % PALETTE.length];
  selectedFreq = 'daily';
  selectedDays = new Set();
  document.querySelectorAll('#freqGrid .freq-chip').forEach(b => b.classList.toggle('active', b.dataset.freq === 'daily'));
  document.getElementById('daysField').style.display = 'none';
  buildColorPicker();
  buildDaysGrid();
  document.getElementById('timesList').innerHTML = '';
  addTimeRow('08:00');
  document.getElementById('deleteBtn').style.display = 'none';
  showSheet();
}

function editMedication(id) {
  const med = meds.find(m => m.id === id);
  if (!med) return;
  editingId = id;
  document.getElementById('sheetTitle').textContent = t('editMedTitle');
  document.getElementById('medName').value = med.name;
  document.getElementById('medDose').value = med.dose || '';
  document.getElementById('medFood').value = med.food || 'any';
  document.getElementById('medStock').value = (med.stockCount === null || med.stockCount === undefined) ? '' : med.stockCount;
  document.getElementById('medLowStockThreshold').value = (med.lowStockThreshold === null || med.lowStockThreshold === undefined) ? '' : med.lowStockThreshold;
  document.getElementById('medNotes').value = med.notes || '';
  selectedColor = med.color;
  selectedFreq = med.freq;
  selectedDays = new Set(med.days || []);
  document.querySelectorAll('#freqGrid .freq-chip').forEach(b => b.classList.toggle('active', b.dataset.freq === med.freq));
  document.getElementById('daysField').style.display = med.freq === 'custom' ? 'block' : 'none';
  buildColorPicker();
  buildDaysGrid();
  document.getElementById('timesList').innerHTML = '';
  (med.times || ['08:00']).forEach(time => addTimeRow(time));
  document.getElementById('deleteBtn').style.display = 'block';
  showSheet();
}

function showSheet() { document.getElementById('overlay').classList.add('show'); document.getElementById('sheet').classList.add('show'); }
function closeSheet() { document.getElementById('overlay').classList.remove('show'); document.getElementById('sheet').classList.remove('show'); }
function openAccountSheet() { document.getElementById('overlayAccount').classList.add('show'); document.getElementById('accountSheet').classList.add('show'); }
function closeAccountSheet() { document.getElementById('overlayAccount').classList.remove('show'); document.getElementById('accountSheet').classList.remove('show'); }

async function saveMedication() {
  const name = document.getElementById('medName').value.trim();
  if (!name) { alert(t('pleaseEnterMedName')); return; }
  const times = Array.from(document.querySelectorAll('#timesList input[type=time]')).map(i => i.value).filter(Boolean);
  if (times.length === 0) { alert(t('pleaseAddTime')); return; }

  const stockRaw = document.getElementById('medStock').value.trim();
  const thresholdRaw = document.getElementById('medLowStockThreshold').value.trim();
  if (stockRaw !== '' && (isNaN(stockRaw) || Number(stockRaw) < 0)) { alert(t('invalidStockNumber')); return; }
  if (thresholdRaw !== '' && (isNaN(thresholdRaw) || Number(thresholdRaw) < 0)) { alert(t('invalidStockNumber')); return; }

  const med = {
    id: editingId || uid(),
    name,
    dose: document.getElementById('medDose').value.trim(),
    food: document.getElementById('medFood').value,
    notes: document.getElementById('medNotes').value.trim(),
    color: selectedColor,
    freq: selectedFreq,
    days: Array.from(selectedDays),
    times: times.sort(),
    stockCount: stockRaw === '' ? null : Number(stockRaw),
    lowStockThreshold: thresholdRaw === '' ? null : Number(thresholdRaw)
  };

  if (editingId) {
    const idx = meds.findIndex(m => m.id === editingId);
    meds[idx] = med;
  } else {
    meds.push(med);
  }
  closeSheet();
  renderAll();
  scheduleAlarms();

  try {
    await api('save_medication', { userId: session.userId, medication: med });
  } catch (err) {
    alert(t('syncFailedSave') + err.message);
  }
}

async function deleteMedication() {
  if (!editingId) return;
  if (!confirm(t('confirmDeleteMed'))) return;
  const medId = editingId;
  meds = meds.filter(m => m.id !== medId);
  closeSheet();
  renderAll();
  scheduleAlarms();
  try {
    await api('delete_medication', { userId: session.userId, medId });
  } catch (err) {
    alert(t('syncFailedDelete') + err.message);
  }
}

/* ============ ALARMS ============ */
function clearAlarmTimers() { alarmTimers.forEach(timer => clearTimeout(timer)); alarmTimers = []; }

function scheduleAlarms() {
  clearAlarmTimers();
  const now = new Date();
  meds.forEach(med => {
    if (!medActiveToday(med)) return;
    (med.times || []).forEach(time => {
      const [h, m] = time.split(':').map(Number);
      const target = new Date();
      target.setHours(h, m, 0, 0);
      const ms = target.getTime() - now.getTime();
      if (ms > 0 && ms < 24 * 60 * 60 * 1000) {
        if (isTaken(med.id, time)) return;
        alarmTimers.push(setTimeout(() => triggerAlarm(med, time), ms));
      }
    });
  });
}

function triggerAlarm(med, time) {
  activeAlarm = { med, time };
  const snoozeKey = med.id + '|' + time;
  const snoozeCount = snoozeCounts[snoozeKey] || 0;

  document.getElementById('alarmDrugName').textContent = med.name;
  document.getElementById('alarmCapsule').style.cssText += capsuleStyle(med.color);

  const card = document.querySelector('.alarm-card');
  const eyebrow = document.getElementById('alarmEyebrow');
  if (snoozeCount >= 1) {
    card.classList.add('escalated');
    eyebrow.textContent = t('stillWaitingTake');
    document.getElementById('alarmDoseInfo').textContent = `${med.dose || ''}${med.food && med.food !== 'any' ? ' · ' + foodLabel(med.food) : ''} · ${formatTime12(time)} · ${t('snoozedAgain')}`;
  } else {
    card.classList.remove('escalated');
    eyebrow.textContent = t('timeToTake');
    document.getElementById('alarmDoseInfo').textContent = `${med.dose || ''}${med.food && med.food !== 'any' ? ' · ' + foodLabel(med.food) : ''} · ${formatTime12(time)}`;
  }

  document.getElementById('alarmOverlay').classList.add('show');
  playAlarmSound();
  sendBrowserNotification(med, time);
  renderTimeline();
}

function playAlarmSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    window._medtrackAudioCtx = ctx;
    let beepCount = 0;
    function beep() {
      if (!document.getElementById('alarmOverlay').classList.contains('show')) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.45);
      beepCount++;
      if (beepCount < 60) setTimeout(beep, 900);
    }
    beep();
  } catch (e) {}
}
function stopAlarmSound() {
  if (window._medtrackAudioCtx) { try { window._medtrackAudioCtx.close(); } catch (e) {} window._medtrackAudioCtx = null; }
}
function sendBrowserNotification(med, time) {
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      const n = new Notification(t('timeToTake') + ' ' + med.name, {
        body: `${med.dose || ''} · ${formatTime12(time)}`,
        tag: 'medtrack-' + med.id + '-' + time,
        requireInteraction: true
      });
      n.onclick = () => window.focus();
    } catch (e) {}
  }
}
function confirmAlarmTaken() {
  if (activeAlarm) {
    setTaken(activeAlarm.med.id, activeAlarm.time, true);
    delete snoozeCounts[activeAlarm.med.id + '|' + activeAlarm.time];
  }
  closeAlarmModal();
}
function snoozeAlarm() {
  if (activeAlarm) {
    const med = activeAlarm.med, time = activeAlarm.time;
    const snoozeKey = med.id + '|' + time;
    snoozeCounts[snoozeKey] = (snoozeCounts[snoozeKey] || 0) + 1;
    const delayMinutes = snoozeCounts[snoozeKey] >= 2 ? 5 : 10;
    closeAlarmModal();
    alarmTimers.push(setTimeout(() => triggerAlarm(med, time), delayMinutes * 60 * 1000));
  } else {
    closeAlarmModal();
  }
}
function closeAlarmModal() {
  document.getElementById('alarmOverlay').classList.remove('show');
  stopAlarmSound();
  activeAlarm = null;
}
async function silentlyResyncPushToken() {
  if (!firebaseReady || !('serviceWorker' in navigator) || !('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  try {
    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    const token = await fcmMessaging.getToken({
      vapidKey: FCM_VAPID_KEY,
      serviceWorkerRegistration: registration
    });
    if (token) {
      await api('save_push_token', { userId: session.userId, token, lang: currentLang });
    }
  } catch (err) {
    console.error('Silent push resync failed:', err.message);
  }
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') return;

  document.getElementById('notifBanner').style.display = 'none';

  // Try to set up real push notifications (works while the app is closed).
  // If Firebase isn't configured yet, or the platform doesn't support it
  // (e.g. iOS Safari in a regular browser tab, not added to home screen),
  // this fails quietly and the existing in-app alarm still works whenever
  // the app is open.
  if (!firebaseReady || !('serviceWorker' in navigator)) return;
  try {
    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    const token = await fcmMessaging.getToken({
      vapidKey: FCM_VAPID_KEY,
      serviceWorkerRegistration: registration
    });
    if (token) {
      await api('save_push_token', { userId: session.userId, token, lang: currentLang });
    }
  } catch (err) {
    console.error('Push subscription failed (in-app alerts still work while the app is open):', err.message);
  }
}
function checkNotifBanner() {
  const banner = document.getElementById('notifBanner');
  if ('Notification' in window && Notification.permission === 'default' && meds.length > 0) {
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }
}

/* ============ MIDNIGHT ROLLOVER ============ */
let lastDateKey = todayKey();
async function checkRollover() {
  const k = todayKey();
  if (k !== lastDateKey) {
    lastDateKey = k;
    snoozeCounts = {};
    try {
      const logsData = await api('get_logs', { userId: session.userId, dateKey: k });
      takenLog = logsData.logs || {};
    } catch (e) { takenLog = {}; }
    renderAll();
    scheduleAlarms();
  }
}

/* ============ RENDER ALL ============ */
function renderAll() {
  applyTranslations();
  renderTimeline();
  renderMedList();
  checkNotifBanner();
}

/* ============ INIT ============ */
(function init() {
  applyTranslations();
  populateStaticOptions();
  document.getElementById('langKm').classList.toggle('active', currentLang === 'km');
  document.getElementById('langEn').classList.toggle('active', currentLang === 'en');
  document.documentElement.lang = currentLang;

  if (session && session.userId) {
    enterApp();
  } else {
    showScreen('login');
  }
  setInterval(renderTimeline, 30000);
  setInterval(() => { if (session) checkRollover(); }, 30000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && session) enterApp();
  });
})();
</script>
