<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="data:application/manifest+json,%7B%22display%22%3A%22standalone%22%2C%22start_url%22%3A%22.%22%2C%22name%22%3A%22Standalone%20Check%22%7D">
</head>
<body style="font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.6;">
<h3>Standalone-mode Push API check</h3>
<p>This must be added to your home screen (Share &rarr; Add to Home Screen) and opened from that icon, just like MedTrack, to give an accurate result.</p>
<pre id="out" style="white-space: pre-wrap; background: #f0f0f0; padding: 14px; border-radius: 8px;"></pre>
<script>
const out = document.getElementById('out');
function log(msg) { out.textContent += msg + '\n'; }
log('display-mode standalone: ' + window.matchMedia('(display-mode: standalone)').matches);
log('navigator.standalone (iOS): ' + (window.navigator.standalone === undefined ? 'undefined' : window.navigator.standalone));
log('PushManager in window: ' + ('PushManager' in window));
log('Notification in window: ' + ('Notification' in window));
log('serviceWorker in navigator: ' + ('serviceWorker' in navigator));
log('User agent: ' + navigator.userAgent);
</script>
</body></html>
